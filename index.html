<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e9e3d7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="好事花生" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="记录每天发生的好事，以及它为什么会发生。" />
    <title>好事花生</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="好事花生移动端原型">
      <section class="app-screen" data-view="today">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="today-weekday">今天</p>
            <h1 id="today-date">6月11日</h1>
          </div>
          <button class="icon-button" id="settings-button" aria-label="打开设置" title="设置">
            <span aria-hidden="true">⚙</span>
          </button>
        </header>

        <section class="empty-hero" id="empty-hero">
          <button class="primary-button quiet-cta" data-action="new">今天也有好事发生</button>
        </section>

        <section class="today-content" id="today-content" hidden>
          <div class="section-heading">
            <div>
              <p class="soft-label">今天</p>
              <h2 id="today-count">已经留下 0 件好事</h2>
            </div>
            <button class="primary-button compact" data-action="new">记录</button>
          </div>
          <div class="card-list" id="today-list"></div>
        </section>
      </section>

      <section class="app-screen" data-view="review" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">REVIEW</p>
            <h1 id="calendar-title">June 2026</h1>
          </div>
        </header>

        <section class="calendar-card" aria-label="月历回顾">
          <div class="calendar-card-header">
            <span id="calendar-month-number">6</span>
            <strong>CALENDAR</strong>
          </div>
          <div class="calendar-weekdays">
            <span>MON</span>
            <span>TUE</span>
            <span>WED</span>
            <span>THU</span>
            <span>FRI</span>
            <span>SAT</span>
            <span>SUN</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </section>

        <section class="day-review">
          <p class="soft-label" id="selected-date-label">Selected day</p>
          <div class="card-list" id="selected-day-list"></div>
          <button class="ghost-button add-past-button" id="add-selected-day">补记这一天</button>
        </section>
      </section>

      <nav class="bottom-tabs" aria-label="底部导航">
        <button class="tab active" data-tab="today">今日</button>
        <button class="tab" data-tab="review">回顾</button>
      </nav>
    </main>

    <section class="editor" id="editor" aria-modal="true" role="dialog" hidden>
      <div class="editor-panel">
        <header class="editor-topbar">
          <button class="text-button" id="cancel-edit">取消</button>
          <h2 id="editor-title">记录一件好事</h2>
          <button class="text-button strong" id="save-entry" disabled>保存</button>
        </header>

        <label class="field">
          <span>今天发生了什么好事？</span>
          <textarea id="thing-input" rows="4" placeholder="比如：吃到了超满意的料理"></textarea>
        </label>

        <label class="field">
          <span>为什么它会发生？</span>
          <small>可以想想：你的选择、他人的帮助、当时的环境，分别起了什么作用。</small>
          <div class="reason-control">
            <span aria-hidden="true">是因为</span>
            <textarea id="reason-input" rows="5" aria-label="原因" placeholder="我超勤快地出了门，并且厨师的手艺特别合我胃口。"></textarea>
          </div>
        </label>

        <label class="field">
          <span>标签，可选</span>
          <input id="tags-input" type="text" placeholder="生活、工作、关系" />
        </label>
      </div>
    </section>

    <section class="settings" id="settings" aria-modal="true" role="dialog" hidden>
      <div class="settings-panel">
        <header class="editor-topbar">
          <button class="text-button" id="close-settings">完成</button>
          <h2>设置</h2>
          <span></span>
        </header>

        <section class="setting-group">
          <h3>每日提醒</h3>
          <label class="setting-row">
            <span>开启提醒</span>
            <input type="checkbox" checked />
          </label>
          <label class="setting-row">
            <span>提醒时间</span>
            <input type="time" value="21:30" />
          </label>
        </section>

        <section class="setting-group">
          <h3>标签管理</h3>
          <div class="tag-management">
            <span>生活</span>
            <span>工作</span>
            <span>关系</span>
            <span>散步</span>
          </div>
        </section>

        <section class="setting-group">
          <h3>数据</h3>
          <button class="ghost-button">导出数据</button>
        </section>
      </div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
